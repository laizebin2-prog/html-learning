<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>邮件测试</title>
    <style>
      form {
        line-height: 2.2;
        text-align: left;
      }
      form label {
        display: inline-block;
        width: 60px;
      }
      form input,
      form textarea {
        width: 220px;
        padding: 4px;
      }
      #message {
        margin-top: 12px;
        min-height: 24px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>邮件发送测试</h1>
      <form id="emailForm">
        <label for="toEmail">收件人:</label>
        <input type="email" id="toEmail" placeholder="example@email.com"><br>
        <label for="subject">主题:</label>
        <input type="text" id="subject" placeholder="邮件主题"><br>
        <label for="content">内容:</label><br>
        <textarea id="content" rows="4" placeholder="邮件正文"></textarea><br>
        <button type="submit">发送邮件</button>
      </form>
      <p id="message"></p>
    </div>

    <script src="emailtest.js"></script>
  </body>
</html>
